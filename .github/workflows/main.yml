name: Portfolio CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Display Files
        run: ls

      - name: Check HTML File
        run: echo "HTML file checked successfully"

      - name: Check CSS File
        run: echo "CSS file checked successfully"

      - name: Pipeline Completed
        run: echo "GitHub Actions Pipeline Executed Successfully"
